<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>MyCine - Detalhes</title>
</head>
<body class="page-detalhes">

    <header>
        <div class="logo">My<span>Cine</span></div>
        <nav class="menu">
            <a href="../Home/home.html">Descobrir</a>
            <a href="../Perfil/perfil.html">Perfil</a>
            <a href="../Perfil/perfil.html#listas">Minhas Listas</a>
        </nav>
        <button class="btn-voltar" onclick="history.back()">← Voltar</button>
    </header>

    <main id="detalhes-main">

        <!-- backdrop -->
        <div class="backdrop" id="backdrop"></div>

        <!-- conteúdo principal -->
        <div class="detalhes-container">

            <div class="poster-wrap">
                <img id="poster" src="" alt="Poster"/>
            </div>

            <div class="info-wrap">
                <h1 id="titulo"></h1>
                <p id="tagline"></p>

                <div class="chips" id="chips"></div>
                <div class="generos" id="generos"></div>

                <p class="overview" id="overview"></p>

                <div class="acoes">
                    <button class="btn-fav" id="btn-fav">🤍 Favoritar</button>
                    <button class="btn-assistido" id="btn-assistido">✅ Marcar como assistido</button>
                    <button class="btn-lista" id="btn-lista">➕ Adicionar à lista</button>
                </div>

                <!-- onde assistir -->
                <div class="onde-assistir" id="onde-assistir">
                    <h3>Onde Assistir no Brasil</h3>
                    <div class="providers" id="providers"></div>
                </div>
            </div>
        </div>

        <!-- elenco -->
        <div class="elenco-section">
            <h2 class="section-title">Elenco Principal</h2>
            <div class="elenco-grid" id="elenco"></div>
        </div>

        <!-- similares -->
        <div class="similares-section">
            <h2 class="section-title">Filmes Similares</h2>
            <div class="similares-grid" id="similares"></div>
        </div>

    </main>

    <footer>
        <p>© 2026 MyCine. Desenvolvido por Augusto D.S.Bertoli.</p>
    </footer>

    <script src="detalhes.js"></script>
</body>
</html>
