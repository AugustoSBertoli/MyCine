<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>MyCine - Cadastro</title>
</head>

<body class="page-login">

    <main>
        <h1 class="titulo">Bem-vindo ao MyCine</h1>
        <div class="container">
            <div class="container-login">
                <h2>Login</h2>
                <form action="#">
                    <input type="text" id="login-usuario" placeholder="Usuário">
                    <input type="password" id="login-senha" placeholder="Senha">
                    <button type="submit">Entrar na sessão</button>
                </form>
                <a href="../Home/home.html">Entrar sem ingresso</a>
            </div>

            <div class="divider"></div>

            <div class="container-cadastro">
                <h2>Criar conta</h2>
                <form action="#">
                    <div class="avatar-selector">
                        <p>Escolha seu avatar</p>
                        <div class="avatares">
                            <span class="avatar">🎬</span>
                            <span class="avatar">🎭</span>
                            <span class="avatar">🍿</span>
                            <span class="avatar">🎥</span>
                            <span class="avatar">⭐</span>
                        </div>
                    </div>
                    <input type="text" id="cad-usuario" placeholder="Usuário">
                    <input type="email" id="cad-email" placeholder="Email">
                    <input type="password" id="cad-senha" placeholder="Senha">
                    <button type="submit">Registrar</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 MyCine. Desenvolvido por Augusto D.S.Bertoli.</p>
    </footer>

    <script src="login.js"></script>
</body>

</html>
